spring.application.name=MaintenanceRecord
spring.datasource.url=jdbc:mysql://localhost:3306/maintenance_record?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Cool@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=7074
resilience4j.circuitbreaker.instances.citizenServiceCB.slidingWindowSize=10
